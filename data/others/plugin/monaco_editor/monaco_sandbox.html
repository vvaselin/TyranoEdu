<!DOCTYPE html>
<html lang="en" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Sandbox</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #editor-container { width: 100%; height: 100%; }
        @font-face {
            font-family: 'Cascadia Code';
            src: url('https://cdn.jsdelivr.net/fontsource/fonts/cascadia-code@latest/latin-400-normal.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        /* Firefox 対策: Monaco の描画要素に font-feature-settings を直接指定 */
        .monaco-editor,
        .monaco-editor .view-lines,
        .monaco-editor .view-line span {
            font-feature-settings: "calt" 1, "liga" 1 !important;
            -moz-font-feature-settings: "calt" 1, "liga" 1 !important;
        }
    </style>
</head>
<!-- noctis-minimus の背景色に合わせる -->
<body style="background-color: #1b2932;">

    <div id="editor-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.min.js"></script>
    <script>
        let editor;

        const PLUGIN_DIR = './';

        async function loadJSON(path) {
            const res = await fetch(PLUGIN_DIR + path);
            if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
            return res.json();
        }

        function registerSnippets(lang, snippetData) {
            monaco.languages.registerCompletionItemProvider(lang, {
                triggerCharacters: snippetData.triggerCharacters || [],
                provideCompletionItems: (model, position) => {
                    const word = model.getWordUntilPosition(position);
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber:   position.lineNumber,
                        startColumn:     word.startColumn,
                        endColumn:       word.endColumn
                    };
                    const kind = monaco.languages.CompletionItemKind;
                    const suggestions = snippetData.snippets.map(s => ({
                        label:          s.label,
                        detail:         s.detail,
                        documentation:  s.documentation,
                        insertText:     s.insertText,
                        filterText:     s.filterText || undefined,
                        kind:           kind[s.kind] || kind.Snippet,
                        range:          range,
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
                    }));
                    return { suggestions };
                }
            });
        }

        function registerTheme(themeData) {
            monaco.editor.defineTheme(themeData.name, {
                base:    themeData.base,
                inherit: themeData.inherit,
                rules:   themeData.rules,
                colors:  themeData.colors
            });
        }

        /**
         * C++ の Monarch トークナイザをカスタム登録する
         * デフォルトは int 等も keyword トークンになり色分けできないため、
         * typeKeywords と controlKeywords を分離して type トークンを発行する
         */
        function registerCppTokenizer(langData) {
            const typeKeywords    = langData.typeKeywords    || [];
            const controlKeywords = langData.controlKeywords || [];

            monaco.languages.setMonarchTokensProvider('cpp', {
                defaultToken: '',
                typeKeywords,
                controlKeywords,

                escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,

                tokenizer: {
                    root: [
                        // プリプロセッサ (#include, #define 等)
                        [/^\s*#\s*\w+/, 'keyword.directive'],

                        // 識別子 → typeKeywords / controlKeywords / identifier に分岐
                        [/[a-zA-Z_]\w*/, {
                            cases: {
                                '@typeKeywords':    'type',
                                '@controlKeywords': 'keyword',
                                '@default':         'identifier'
                            }
                        }],

                        { include: '@whitespace' },

                        // 演算子（長いものから先にマッチ）
                        [/<<=|>>=|<<|>>|->|::|&&|\|\||\+\+|--|[+\-*\/%&|^!=<>]=|[=<>!~?:+\-*\/&|^%]/, 'operator'],

                        [/[{}()\[\]]/, 'delimiter.bracket'],
                        [/;/,  'delimiter'],
                        [/,/,  'delimiter'],

                        // 数値リテラル
                        [/\d*\.\d+([eE][\-+]?\d+)?[fFdD]?/, 'number.float'],
                        [/0[xX][0-9a-fA-F]+[uUlL]*/, 'number.hex'],
                        [/0[bB][01]+[uUlL]*/, 'number.binary'],
                        [/0[0-7]+[uUlL]*/, 'number.octal'],
                        [/\d+[uUlLfF]*/, 'number'],

                        // 文字列・文字リテラル
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/,  'string', '@string_double'],
                        [/'/,  'string', '@string_single'],
                    ],

                    whitespace: [
                        [/[ \t\r\n]+/, ''],
                        [/\/\*/, 'comment', '@comment'],
                        [/\/\/.*$/, 'comment'],
                    ],

                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\*\//,   'comment', '@pop'],
                        [/[\/*]/,  'comment'],
                    ],

                    string_double: [
                        [/[^\\"]+/, 'string'],
                        [/@escapes/, 'string.escape'],
                        [/\\./,     'string.escape.invalid'],
                        [/"/,       'string', '@pop'],
                    ],

                    string_single: [
                        [/[^\\']+/, 'string'],
                        [/@escapes/, 'string.escape'],
                        [/\\./,     'string.escape.invalid'],
                        [/'/,       'string', '@pop'],
                    ],
                }
            });
        }

        // ========================================
        //  Ctrl+S を無効化（ブラウザの保存ダイアログ抑止）
        // ========================================
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true); // capture phase でブラウザより先に捕まえる

        // ========================================
        //  親ウィンドウからのメッセージを受け取る
        // ========================================
        window.addEventListener('message', event => {
            if (!event.data || typeof event.data !== 'object') return;
            const { command, data } = event.data;

            if (command === 'init') {
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs' }});
                require(['vs/editor/editor.main'], async () => {

                    const lang = data.language || 'cpp';

                    try {
                        const [snippetData, themeData, langData] = await Promise.all([
                            loadJSON('cpp_snippets.json'),
                            loadJSON('cpp_theme.json'),
                            loadJSON('cpp_language.json')
                        ]);
                        registerCppTokenizer(langData);
                        registerSnippets(lang, snippetData);
                        registerTheme(themeData);
                    } catch (e) {
                        console.warn('JSON設定の読み込みに失敗。デフォルト設定で起動します:', e);
                    }

                    editor = monaco.editor.create(document.getElementById('editor-container'), {
                        value:    data.initial_code,
                        language: lang,
                        theme:    'noctis-minimus',
                        fontSize: 16,
                        fontFamily: "'Cascadia Code', Consolas, monospace",
                        fontLigatures: true,
                        minimap:  { enabled: false },
                        automaticLayout: true,
                        tabSize: 4,
                        insertSpaces: true,
                        wordWrap: 'off',
                        suggestOnTriggerCharacters: true,
                        quickSuggestions: true,
                        snippetSuggestions: 'top',
                        bracketPairColorization: { enabled: true },
                        autoClosingBrackets: 'always',
                        autoClosingQuotes: 'always',
                        formatOnPaste: true,
                        scrollBeyondLastLine: false,
                        renderLineHighlight: 'all',
                        cursorBlinking: 'smooth',
                        smoothScrolling: true,
                        padding: { top: 8 },
                    });

                    // Ctrl+S をエディタコマンドレベルでも無効化
                    editor.addCommand(
                        monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
                        () => { /* no-op */ }
                    );

                    editor.getModel().onDidChangeContent(() => {
                        parent.postMessage({ type: 'monaco_change', code: editor.getValue() }, '*');
                    });
                });
            }

            if (command === 'set_code' && editor) {
                editor.setValue(data.code);
            }

            if (command === 'get_code' && editor) {
                parent.postMessage({ type: 'monaco_code', code: editor.getValue() }, '*');
            }

            if (command === 'set_markers' && editor) {
                console.log('[monaco_sandbox] set_markers received:', JSON.stringify(data));
                const severityMap = {
                    'error':   monaco.MarkerSeverity.Error,
                    'warning': monaco.MarkerSeverity.Warning,
                };
                const markers = (data.markers || []).map(m => ({
                    startLineNumber: m.startLineNumber,
                    startColumn:     m.startColumn,
                    endLineNumber:   m.endLineNumber,
                    endColumn:       m.endColumn,
                    message:         m.message,
                    severity:        severityMap[m.severity] ?? monaco.MarkerSeverity.Error,
                }));
                console.log('[monaco_sandbox] applying markers:', JSON.stringify(markers));
                monaco.editor.setModelMarkers(editor.getModel(), 'gcc', markers);
            }

            if (command === 'clear_markers' && editor) {
                monaco.editor.setModelMarkers(editor.getModel(), 'gcc', []);
            }
        });
    </script>
</body>
</html>
