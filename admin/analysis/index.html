<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experiment Analysis</title>
  <link rel="stylesheet" href="/admin/admin.css?v=20260613-3">
  <link rel="stylesheet" href="/admin/css/analysis.css?v=20260613-3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script src="/admin/js/api.js?v=20260613-3" defer></script>
  <script src="/admin/js/ui.js?v=20260613-3" defer></script>
  <script src="/admin/js/stats.js?v=20260613-3" defer></script>
  <script src="/admin/analysis/charts.js?v=20260613-3" defer></script>
  <script src="/admin/analysis/analysis.js?v=20260613-3" defer></script>
</head>
<body>
  <header>
    <h1>Experiment Analysis</h1>
    <nav class="admin-nav">
      <a href="/admin/">ログ</a>
      <a href="/admin/participants/">参加者管理</a>
      <a href="/admin/analysis/">群間分析</a>
    </nav>
    <div class="auth">
      <input id="admin-password" type="password" placeholder="管理パスワード" autocomplete="current-password">
      <button id="load-analysis">読み込み</button>
    </div>
  </header>

  <main class="analysis-page">
    <section class="analysis-toolbar panel">
      <div class="bar">
        <strong>分析</strong>
        <select id="role-filter">
          <option value="">全群</option>
          <option value="experimental">experimental</option>
          <option value="control">control</option>
        </select>
        <input id="participant-filter" type="text" placeholder="participant_id / 名前">
        <button class="secondary" id="download-analysis-csv" disabled>参加者別CSV</button>
        <span id="analysis-status" class="status">未読み込み</span>
      </div>
    </section>

    <section id="summary-cards" class="summary-grid"></section>

    <section class="section-jump panel">
      <a href="#learning-section">学習成果</a>
      <a href="#experience-section">経験差</a>
      <a href="#quota-section">ノルマ10問</a>
      <a href="#category-section">カテゴリ別</a>
      <a href="#survey-section">アンケート</a>
    </section>

    <section class="analysis-grid" id="learning-section">
      <div class="panel analysis-panel">
        <div class="bar"><strong>学習成果</strong></div>
        <div class="chart-box"><canvas id="learning-chart"></canvas><div class="chart-fallback" id="learning-chart-fallback"></div></div>
        <div class="scroll table-scroll"><table id="learning-table" class="metric-table"></table></div>
      </div>
      <div class="panel analysis-panel">
        <div class="bar"><strong>ノルマ指標との探索的相関</strong><span class="note">因果ではなく傾向確認用</span></div>
        <div class="chart-box"><canvas id="scatter-chart"></canvas><div class="chart-fallback" id="scatter-chart-fallback"></div></div>
        <div class="scroll table-scroll"><table id="correlation-table" class="metric-table"></table></div>
      </div>
    </section>

    <section class="analysis-grid" id="experience-section">
      <div class="panel analysis-panel">
        <div class="bar"><strong>プログラミング経験・初期能力差</strong></div>
        <div class="scroll table-scroll"><table id="experience-table" class="metric-table"></table></div>
      </div>
      <div class="panel analysis-panel">
        <div class="bar"><strong>事前テスト水準別</strong></div>
        <div class="scroll table-scroll"><table id="pre-level-table"></table></div>
        <div class="bar subbar"><strong>経験言語・期間</strong></div>
        <div class="scroll table-scroll short"><table id="language-table"></table></div>
      </div>
    </section>

    <section class="panel analysis-panel" id="quota-section">
      <div class="bar"><strong>ノルマ10問</strong><span class="note">各カテゴリ difficulty 1・2</span></div>
      <div class="chart-box short"><canvas id="task-chart"></canvas><div class="chart-fallback" id="task-chart-fallback"></div></div>
      <div class="scroll table-scroll"><table id="quota-task-table"></table></div>
    </section>

    <section class="analysis-grid" id="category-section">
      <div class="panel analysis-panel">
        <div class="bar"><strong>カテゴリ別比較</strong></div>
        <div class="scroll table-scroll"><table id="category-table"></table></div>
      </div>
      <div class="panel analysis-panel">
        <div class="bar"><strong>発展課題 difficulty 3以上</strong></div>
        <div class="scroll table-scroll"><table id="advanced-task-table"></table></div>
      </div>
    </section>

    <section class="analysis-grid" id="survey-section">
      <div class="panel analysis-panel">
        <div class="bar"><strong>アンケート集計</strong></div>
        <div class="scroll table-scroll"><table id="survey-table" class="metric-table"></table></div>
      </div>
      <div class="panel analysis-panel">
        <div class="bar"><strong>自由記述</strong></div>
        <div class="scroll table-scroll"><table id="free-text-table"></table></div>
      </div>
    </section>

    <section class="panel analysis-panel">
      <div class="bar"><strong>参加者別データ</strong></div>
      <div class="scroll table-scroll large"><table id="participant-table"></table></div>
    </section>
  </main>
</body>
</html>
